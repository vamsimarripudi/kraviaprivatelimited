spring:
  application:
    name: kravia-company-os
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kravia_companyos}
    username: ${DATABASE_USERNAME:kravia}
    password: ${DATABASE_PASSWORD:kravia}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${KRAVIA_DOCUMENT_MULTIPART_MAX_SIZE:25MB}
      max-request-size: ${KRAVIA_DOCUMENT_MULTIPART_MAX_REQUEST_SIZE:30MB}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

kravia:
  security:
    jwt-secret: ${KRAVIA_JWT_SECRET}
    jwt-expiration-minutes: ${KRAVIA_JWT_EXPIRATION_MINUTES:480}
  bootstrap:
    founder-email: ${KRAVIA_BOOTSTRAP_FOUNDER_EMAIL:}
    founder-password: ${KRAVIA_BOOTSTRAP_FOUNDER_PASSWORD:}
    founder-name: ${KRAVIA_BOOTSTRAP_FOUNDER_NAME:KRAVIA Founder}
  cors:
    allowed-origins: ${KRAVIA_ALLOWED_ORIGINS:http://localhost:4200}
  documents:
    storage-root: ${KRAVIA_DOCUMENT_STORAGE_ROOT:./storage/private-documents}
    max-file-size-bytes: ${KRAVIA_DOCUMENT_MAX_FILE_SIZE_BYTES:26214400}
    allowed-content-types: ${KRAVIA_DOCUMENT_ALLOWED_CONTENT_TYPES:application/pdf,image/png,image/jpeg,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
