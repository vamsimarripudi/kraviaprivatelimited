spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    validate-on-migrate: true

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict

logging:
  level:
    root: INFO
    com.kravia.companyos: INFO
    org.springframework.security: WARN

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

kravia:
  security:
    rate-limit:
      requests-per-window: ${KRAVIA_RATE_LIMIT_REQUESTS:120}
      window-seconds: ${KRAVIA_RATE_LIMIT_WINDOW_SECONDS:60}
    password-min-length: ${KRAVIA_PASSWORD_MIN_LENGTH:12}
    max-failed-login-attempts: ${KRAVIA_MAX_FAILED_LOGIN_ATTEMPTS:5}
    account-lockout-minutes: ${KRAVIA_ACCOUNT_LOCKOUT_MINUTES:15}
    refresh-token-days: ${KRAVIA_REFRESH_TOKEN_DAYS:7}
