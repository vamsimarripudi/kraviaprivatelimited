<header class="top-bar">
  <div>
    <p class="overline">KRAVIA Company OS</p>
    <h1>KRAVIA PRIVATE LIMITED</h1>
  </div>
  <div class="top-bar-actions">
    <dl>
      <div><dt>User</dt><dd>{{ user()?.displayName }}</dd></div>
      <div><dt>Roles</dt><dd>{{ roles().join(', ') }}</dd></div>
    </dl>
    <button class="icon-button" type="button" (click)="toggleTheme()">{{ dark() ? 'Light' : 'Dark' }}</button>
    <button class="icon-button" type="button" (click)="print()">Print</button>
    <button class="icon-button" type="button" (click)="logout()">Logout</button>
  </div>
</header>

<div class="workspace-layout">
  <aside class="sidebar" aria-label="Workspace navigation">
    <nav>
      @for (item of visibleNav(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="is-active">{{ item.label }}</a>
      }
    </nav>
  </aside>
  <main class="main-content">
    <router-outlet />
  </main>
</div>
