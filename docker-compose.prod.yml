services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kravia_companyos}
      POSTGRES_USER: ${POSTGRES_USER:-kravia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kravia} -d ${POSTGRES_DB:-kravia_companyos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kravia_companyos}
      DATABASE_USERNAME: ${POSTGRES_USER:-kravia}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      KRAVIA_JWT_SECRET: ${KRAVIA_JWT_SECRET}
      KRAVIA_ALLOWED_ORIGINS: ${KRAVIA_ALLOWED_ORIGINS:-http://localhost:8088}
      KRAVIA_DOCUMENT_STORAGE_ROOT: /app/storage/private-documents
      KRAVIA_BOOTSTRAP_FOUNDER_EMAIL: ${KRAVIA_BOOTSTRAP_FOUNDER_EMAIL:-}
      KRAVIA_BOOTSTRAP_FOUNDER_PASSWORD: ${KRAVIA_BOOTSTRAP_FOUNDER_PASSWORD:-}
      KRAVIA_BOOTSTRAP_FOUNDER_NAME: ${KRAVIA_BOOTSTRAP_FOUNDER_NAME:-KRAVIA Founder}
      KRAVIA_RATE_LIMIT_REQUESTS: ${KRAVIA_RATE_LIMIT_REQUESTS:-120}
      KRAVIA_RATE_LIMIT_WINDOW_SECONDS: ${KRAVIA_RATE_LIMIT_WINDOW_SECONDS:-60}
      KRAVIA_MAX_FAILED_LOGIN_ATTEMPTS: ${KRAVIA_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      KRAVIA_ACCOUNT_LOCKOUT_MINUTES: ${KRAVIA_ACCOUNT_LOCKOUT_MINUTES:-15}
      KRAVIA_REFRESH_TOKEN_DAYS: ${KRAVIA_REFRESH_TOKEN_DAYS:-7}
    volumes:
      - document_storage:/app/storage/private-documents
    expose:
      - "8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres_data:
  document_storage:

